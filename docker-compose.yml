version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: run_plan_generator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/run_plan_generator?sslmode=disable
      SESSION_SECRET: changeme_in_production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
