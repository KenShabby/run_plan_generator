name: "80/20 5K Level 2"
description: "9-week 5K plan for intermediate runners. Base phase weeks 1-3, peak phase weeks 4-8, taper week 9. Workouts are time-based with heart rate zones. Mon=rest except where noted. Ends with a 5K race on Sunday of week 9."
