name: "Brendan Test Run Plan Template"
description: "Just a test to make sure days of the week are lining up properly"
plan_type: marathon
distance_unit: miles
total_weeks: 3
peak_weekly_mileage: 95

runs:
  # Week 1
  - day_offset: 1 #Monday
    run_type: easy
    distance: 3.0
    notes: "Long run"
  - day_offset: 2
    run_type: tempo
    distance: 9.0
    notes: "Tempo run"
    segments:
    - order_index: 1
      description: "Warmup"
      effort_type: distance
      distance: 2.0
      hr_zone_min: 2
      hr_zone_max: 2

    - order_index: 2
      description: "Intervals"
      effort_type: distance
      distance: 0.057  # 100 yards in miles
      repetitions: 5
      hr_zone_min: 5
      hr_zone_max: 5
      set_index: 1
      set_repetitions: 5

    - order_index: 3
      description: "Recovery between intervals"
      effort_type: time
      duration: 120
      repetitions: 5
      hr_zone_min: 1
      hr_zone_max: 2
      set_index: 1
      set_repetitions: 5

    - order_index: 4
      description: "Cooldown"
      effort_type: distance
      distance: 2.0
      hr_zone_min: 2
      hr_zone_max: 2
  - day_offset: 3
    run_type: easy
    distance: 3.0
    notes: "Easy run"
  - day_offset: 4
    run_type: medium_long
    distance: 6.0
    notes: "medium long run"
  - day_offset: 5
    run_type: easy
    distance: 6.0
    notes: "Easy run"
  - day_offset: 6
    run_type: easy
    distance: 6.0
    notes: "Easy Run"
  - day_offset: 7 #Sunday
    run_type: long_run
    distance: 16.0
    notes: "Long Run"

  # Week 2
  - day_offset: 8
    run_type: easy
    distance: 3.0
    notes: "Long run"
  - day_offset: 9
    run_type: easy
    distance: 3.0
    notes: "Rest day"
  - day_offset: 10
    run_type: easy
    distance: 3.0
    notes: "Easy run"
  - day_offset: 11
    run_type: medium_long
    distance: 6.0
    notes: "medium long run"
  - day_offset: 12
    run_type: easy
    distance: 6.0
    notes: "Easy run"
  - day_offset: 13
    run_type: easy
    distance: 6.0
    notes: "Easy Run"
  - day_offset: 14
    run_type: easy
    distance: 6.0
    notes: "Easy Run"

  # Week 3
  - day_offset: 15 # Sunday
    run_type: easy
    distance: 3.0
    notes: "Long run"
  - day_offset: 16
    run_type: easy
    distance: 3.0
    notes: "Rest day"
  - day_offset: 17
    run_type: easy
    distance: 3.0
    notes: "Easy run"
  - day_offset: 18
    run_type: medium_long
    distance: 6.0
    notes: "medium long run"
  - day_offset: 19
    run_type: easy
    distance: 6.0
    notes: "Easy run"
  - day_offset: 20
    run_type: easy
    distance: 6.0
    notes: "Easy Run"
  - day_offset: 21
    run_type: easy
